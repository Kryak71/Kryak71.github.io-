<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="product_style.css">
</head>
<body>

    <div class="product-card">
        
        <div class="card-header">
            <span class="icon-heart">♡</span>
            <span class="icon-cart">🛒</span>
        </div>
        
        <div class="product-main">
            <img src="lenta copy.png" alt="Светодиодная лента" class="product-img">
            
            <div class="credit-info-block">
                <p class="credit-text">КРЕДИТ <br> ДО <span>36</span> МЕС</p>
                <p class="installment-text">РАССРОЧКА <br> ДО <span>6</span> МЕС</p>
            </div>
        </div>

        <div class="product-details">
            <p class="category">Потолочные светильники</p>
            <h3 class="product-name">Светодиодная RGB лента Tapo L920-5</h3>
            
            <div class="price-block">
                <span class="price-label">Супер цена:</span>
                <span class="new-price">199.00</span>
                <span class="old-price">242.68</span>
            </div>

            <div class="bonus-badge">
                <img src="lilicon.png" alt="icon">
                Вернём до <strong>7.28</strong> на бонусную карту
            </div>
            <p class="disclaimer">*тип рассрочки при которой скидка не действует</p>
        </div>
    </div>

</body>
</html>
